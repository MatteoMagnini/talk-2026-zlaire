name: Deploy Hugo site to Pages

on:
  push:
    tags: '*'
    branches-ignore:
      - 'autodelivery**'
      - 'bump-**'
      - 'renovate/**'
    paths-ignore:
      - 'README.md'
      - 'CHANGELOG.md'
      - 'LICENSE'

  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      HUGO_VERSION: 0.147.8

    steps:
      # Checkout repo
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Install Hugo
      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb \
          https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb

          sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Print Hugo version
        run: hugo version

      # Setup Pages (IMPORTANT for baseURL)
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      # Ruby preprocessing (your pipeline)
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          working-directory: shared-slides

      - name: Run the preprocessor
        run: shared-slides/preprocess.rb

      # Build Hugo
      - name: Build with Hugo
        env:
          HUGO_ENVIRONMENT: production
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
        run: |
          hugo \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"

      # Debug (IMPORTANT to catch empty builds)
      - name: Debug output
        run: ls -R build

      # Ensure GitHub Pages compatibility
      - name: Disable Jekyll
        run: touch build/.nojekyll

      # Setup Node 22 (FIX for inline-mermaid)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Mermaid processing
      - name: Transform and Inline Mermaid charts
        uses: cric96/inline-mermaid@1.14.1
        with:
          css-file-regex: '.*custom.*theme.*\.css$'
          root-folder: ./build
          file-regex: '.*\.html?$'
          config-file: config.toml

      # Upload artifact for GitHub Pages
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build

  deploy:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4